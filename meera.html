<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meera & Jaydeep</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #2b1055, #7597de);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
    transition: background 1s ease;
  }
  body.bg-warm { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
  body.bg-final { background: linear-gradient(135deg, #d6336c, #ff8fab); }

  #stars {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
  }

  .scene {
    display: none;
    text-align: center;
    color: white;
    z-index: 10;
    max-width: 600px;
    padding: 30px;
    animation: fadeIn 1.2s ease;
  }
  .scene.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scene h1 {
    font-size: 26px;
    line-height: 1.5;
    min-height: 90px;
    font-weight: 500;
  }
  .cursor {
    display: inline-block;
    width: 3px;
    background: white;
    margin-left: 2px;
    animation: blink 0.8s infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .next-btn {
    margin-top: 25px;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 15px;
    cursor: pointer;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.4);
    opacity: 0;
    transition: opacity 0.5s, transform 0.3s;
  }
  .next-btn.show { opacity: 1; }
  .next-btn:hover { transform: scale(1.08); background: rgba(255,255,255,0.35); }

  /* Final proposal card */
  .card {
    background: white;
    padding: 45px 50px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 15px 50px rgba(0,0,0,0.3);
  }
  .card h1 { color: #d6336c; font-size: 30px; margin-bottom: 8px; }
  .card p { color: #666; margin-bottom: 25px; }
  .buttons { position: relative; height: 60px; }
  button.choice {
    padding: 12px 28px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 0 10px;
  }
  #yesBtn { background: #d6336c; color: white; transition: transform 0.3s; }
  #yesBtn:hover { transform: scale(1.12); }
  #noBtn { background: #eee; color: #333; position: relative; transition: transform 0.15s; }

  .heart {
    position: absolute;
    top: 100%;
    font-size: 20px;
    animation: floatUp linear forwards;
    z-index: 5;
  }
  @keyframes floatUp {
    to { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
  }

  #celebration {
    display: none;
    font-size: 20px;
    color: #d6336c;
    margin-top: 15px;
    font-weight: bold;
  }

  canvas#confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 20;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="confetti"></canvas>

<!-- Scene 1 -->
<div class="scene active" id="scene1">
  <h1 id="text1"><span></span><span class="cursor"></span></h1>
  <button class="next-btn" id="btn1" onclick="goTo(2)">Continue</button>
</div>

<!-- Scene 2 -->
<div class="scene" id="scene2">
  <h1 id="text2"><span></span><span class="cursor"></span></h1>
  <button class="next-btn" id="btn2" onclick="goTo(3)">Continue</button>
</div>

<!-- Scene 3 -->
<div class="scene" id="scene3">
  <h1 id="text3"><span></span><span class="cursor"></span></h1>
  <button class="next-btn" id="btn3" onclick="goTo(4)">One last thing</button>
</div>

<!-- Final Scene -->
<div class="scene" id="scene4">
  <div class="card">
    <h1 id="mainText">Meera, will you marry me?</h1>
    <p>Jaydeep is nervously waiting... 🥹</p>
    <div class="buttons">
      <button class="choice" id="yesBtn" onclick="sayYes()">Yes 💍</button>
      <button class="choice" id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>
    <div id="celebration">She said YES! 🎉 Jaydeep & Meera, forever ❤️</div>
  </div>
</div>

<script>
  /* ---------- Starfield background ---------- */
  const starsCanvas = document.getElementById('stars');
  const sctx = starsCanvas.getContext('2d');
  function resizeStars() {
    starsCanvas.width = window.innerWidth;
    starsCanvas.height = window.innerHeight;
  }
  resizeStars();
  window.addEventListener('resize', resizeStars);
  let stars = Array.from({length: 120}, () => ({
    x: Math.random() * starsCanvas.width,
    y: Math.random() * starsCanvas.height,
    r: Math.random() * 1.5,
    a: Math.random()
  }));
  function drawStars() {
    sctx.clearRect(0,0,starsCanvas.width, starsCanvas.height);
    stars.forEach(s => {
      s.a += (Math.random() - 0.5) * 0.05;
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      sctx.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`;
      sctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  /* ---------- Typewriter ---------- */
  function typeText(elId, text, speed, callback) {
    const span = document.querySelector(`#${elId} span`);
    let i = 0;
    function type() {
      if (i < text.length) {
        span.textContent += text.charAt(i);
        i++;
        setTimeout(type, speed);
      } else if (callback) {
        callback();
      }
    }
    type();
  }

  function goTo(n) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById('scene' + n).classList.add('active');
    if (n === 2) {
      document.body.classList.add('bg-warm');
      typeText('text2', "Every message, every laugh, every little moment with you... they all led here.", 40,
        () => document.getElementById('btn2').classList.add('show'));
    }
    if (n === 3) {
      typeText('text3', "Meera, you're not just someone I love — you're the person I want to build a whole life with.", 40,
        () => document.getElementById('btn3').classList.add('show'));
    }
    if (n === 4) {
      document.body.classList.add('bg-final');
    }
  }

  // Scene 1 starts automatically
  typeText('text1', "Hi Meera, Jaydeep has something to tell you...", 45,
    () => document.getElementById('btn1').classList.add('show'));

  /* ---------- No button dodges ---------- */
  const noBtn = document.getElementById('noBtn');
  const dodgeMessages = ["No", "Are you sure?", "Really?", "Think again 👀", "Last chance...", "Just say yes 🥺"];
  let dodgeCount = 0;
  function moveButton() {
    const x = Math.random() * 220 - 110;
    const y = Math.random() * 120 - 60;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
    if (dodgeCount < dodgeMessages.length - 1) dodgeCount++;
    noBtn.textContent = dodgeMessages[dodgeCount];
  }

  /* ---------- Yes celebration ---------- */
  function sayYes() {
    document.getElementById('mainText').innerText = "She said YES! 💖";
    document.getElementById('celebration').style.display = 'block';
    noBtn.style.display = 'none';
    launchConfetti();
    for (let i = 0; i < 50; i++) createHeart();
    setInterval(createHeart, 350);
  }

  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerText = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (2 + Math.random() * 3) + 's';
    heart.style.fontSize = (16 + Math.random() * 20) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }

  /* ---------- Confetti burst ---------- */
  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#d6336c','#ff8fab','#ffd6e0','#ffffff','#ffb703'];
    let pieces = Array.from({length: 200}, () => ({
      x: canvas.width/2,
      y: canvas.height/2,
      vx: (Math.random()-0.5)*15,
      vy: (Math.random()-0.5)*15 - 5,
      size: Math.random()*8+4,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*360
    }));
    let frame = 0;
    function animate() {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      pieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25;
        p.rot += 5;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI/180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
      });
      frame++;
      if (frame < 150) requestAnimationFrame(animate);
      else ctx.clearRect(0,0,canvas.width, canvas.height);
    }
    animate();
  }
</script>

</body>
</html>
